<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bari Brand Identity - Rakib Ahmed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f221e; /* 🟢 ডার্ক গ্রিন ব্যাকগ্রাউন্ড */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        /* ব্যাক বাটন */
        .back-btn {
            align-self: flex-start;
            max-width: 900px;
            width: 100%;
            margin: 0 auto 30px auto;
        }
        .back-btn a {
            color: #66fcf1;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .back-btn a:hover {
            color: #ffffff;
        }

        /* প্রজেক্ট হেডার */
        .project-header {
            max-width: 900px;
            width: 100%;
            margin: 0 auto 40px auto;
            text-align: left;
        }
        .project-header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .project-header p {
            color: #c5c6c7;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* পিডিএফ ভিউয়ার কন্টেইনার */
        .pdf-viewer {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pdf-page {
            width: 100%;
            background-color: #152d27;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.3s;
        }
        .pdf-page:hover {
            transform: scale(1.01);
        }

        .pdf-page img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- ব্যাক বাটন -->
    <div class="back-btn">
        <a href="index.html">← Back to Portfolio</a>
    </div>

    <!-- প্রজেক্টের বিবরণ -->
    <div class="project-header">
        <h1>Site Bari Brand Identity</h1>
        <p>A premium visual system developed for Site Bari. Scroll down to view the complete 15-page presentation.</p>
    </div>

    <!-- ১৫ পৃষ্ঠার পিডিএফ স্ক্রোলিং গ্যালারি -->
