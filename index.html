<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakib Ahmed | Portfolio</title>
    <style>
        /* মেইন ব্যাকগ্রাউন্ড কালার */
        body { 
            background-color: #060606; 
            color: #e2e8f0; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif;
        }

        /* লোডিং স্ক্রিন - আপনার ব্র্যান্ড কালার দিয়ে */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #060606;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }
        
        .loader-spinner {
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top: 4px solid #06b6d4; /* ব্র্যান্ড কালার সায়ান */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* অন্যান্য এলিমেন্ট */
        .container { max-width: 900px; margin: auto; padding: 50px 20px; }
        .project-card { 
            background-color: #1a1a1a; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
        }
        a { color: #06b6d4; text-decoration: none; }
    </style>
</head>
<body>

    <!-- লোডিং স্ক্রিন -->
    <div id="loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- মেইন কন্টেন্ট -->
    <div class="container">
        <h1>Rakib Ahmed</h1>
        <p>Creative Logo & Brand Identity Designer</p>
        
        <div class="project-card">
            <h3>Foorti Courier</h3>
            <p>গতি, শক্তি এবং নির্ভরযোগ্যতাকে ফুটিয়ে তুলতে তৈরি একটি মোশন-বেসড লোগো সিস্টেম।</p>
        </div>

        <div class="project-card">
            <h3>Vaxon</h3>
            <p>হেলথ ও ওয়েলনেস ই-কমার্স প্ল্যাটফর্মের জন্য ভারসাম্য ও জীবনশক্তির প্রতীকী ভিজ্যুয়াল আইডেন্টিটি।</p>
        </div>

        <div id="connect">
            <h3>Connect With Me</h3>
            <a href="#">Behance</a> | <a href="#">Email Me</a>
        </div>
    </div>

    <script>
        // পেজ লোড হওয়ার পর লোডার সরিয়ে ফেলা
        window.addEventListener('load', function() {
            document.getElementById('loader').style.display = 'none';
        });
    </script>
</body>
</html>
