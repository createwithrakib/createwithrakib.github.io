<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakib Ahmed | Logo & Brand Identity Designer</title>
    <style>
        /* লোগো অ্যানিমেশন স্টাইল (আপনার আগের কোডের সাথে যোগ করা হলো) */
        .logo-sidebar { position: fixed; top: 0; width: 15%; height: 100vh; overflow: hidden; pointer-events: none; z-index: 0; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); opacity: 0.4; }
        .sidebar-left { left: 0; }
        .sidebar-right { right: 0; }
        .track { display: flex; flex-direction: column; gap: 30px; padding: 20px; }
        .track img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .track-down { animation: scrollDown 25s linear infinite; }
        .track-up { animation: scrollUp 25s linear infinite; }
        @keyframes scrollDown { from { transform: translateY(-50%); } to { transform: translateY(0%); } }
        @keyframes scrollUp { from { transform: translateY(0%); } to { transform: translateY(-50%); } }

        /* আপনার আগের স্টাইলগুলো এখানে যা ছিল হুবহু তাই থাকবে */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; scroll-behavior: smooth; }
        body { background-color: #061110; color: #f1f5f9; padding-top: 100px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background-color: rgba(6, 17, 16, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(17, 41, 38, 0.4); display: flex; justify-content: space-between; align-items: center; padding: 0 10%; z-index: 9999; }
        .nav-brand { display: flex; align-items: center; text-decoration: none; }
        .nav-brand img { height: 55px; width: auto; object-fit: contain; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-item a { color: #94a3b8; text-decoration: none; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s ease; position: relative; padding: 5px 0; }
        .nav-item a:hover { color: #06b6d4; }
        .nav-item a::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background-color: #06b6d4; transition: all 0.3s ease; transform: translateX(-50%); }
        .nav-item a:hover::after { width: 100%; }

        .container { max-width: 900px; width: 100%; padding: 40px 20px; position: relative; z-index: 1; }
        header { margin-bottom: 60px; margin-top: 20px; }
        h1 { color: #ffffff; font-size: 3rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
        .subtitle { color: #06b6d4; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 30px; }
        .bio { font-size: 1.15rem; line-height: 1.8; color: #cbd5e1; }
        .bio p { margin-bottom: 15px; }
        .section-title { color: #ffffff; font-size: 1.8rem; margin-top: 80px; margin-bottom: 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 10px; }
        .project-card { background-color: rgba(30, 41, 59, 0.15); backdrop-filter: blur(16px); padding: 28px; border-radius: 12px; transition: all 0.4s ease; border: 1px solid #112926; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); margin-bottom: 20px; }
        .project-card:hover { transform: translateY(-6px); border-color: #06b6d4; }
        .project-title { color: #ffffff; font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; }
        .project-desc { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .price-card { background-color: rgba(30, 41, 59, 0.15); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #112926; }
        .price-amount { color: #06b6d4; font-size: 1.8rem; font-weight: 700; }
        .faq-item { margin-bottom: 25px; background-color: rgba(30, 41, 59, 0.1); padding: 20px; border-radius: 8px; border-left: 3px solid #06b6d4; }
        .btn { display: inline-block; padding: 12px 24px; border: 2px solid #06b6d4; color: #06b6d4; text-decoration: none; font-weight: 600; border-radius: 4px; transition: all 0.3s ease; }
        .btn:hover { background-color: #06b6d4; color: #061110; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #061110; display: flex; justify-content: center; align-items: center; z-index: 999999; }
        .personal-logo-container img { height: 160px; }
    </style>
</head>
<body>

    <!-- লোগো ট্র্যাকিং কলামগুলো এখানে যোগ করা হয়েছে -->
    <div class="logo-sidebar sidebar-left">
        <div class="track track-down">
            <img src="Runex-01.jpg" alt="Logo">
            <img src="Site bari 3-07.jpg" alt="Logo">
            <img src="Freelancer [Recovered]-01.jpg" alt="Logo">
            <img src="Freelancer 3-01.jpg" alt="Logo">
        </div>
    </div>
    <div class="logo-sidebar sidebar-right">
        <div class="track track-up">
            <img src="Artboard 1-100.jpg" alt="Logo">
            <img src="Baraka Guide line -20.jpg" alt="Logo">
            <img src="Aur Branding-14.jpg" alt="Logo">
            <img src="Site bari-11.jpg" alt="Logo">
            <img src="Artboard 24-100.jpg" alt="Logo">
            <img src="Runex-05.jpg" alt="Logo">
        </div>
    </div>

    <!-- লডার -->
    <div id="loader">
        <div class="personal-logo-container">
            <img src="Personal logo & vcolour -01-Photoroom.png" alt="Logo">
        </div>
    </div>

    <!-- নেভিগেশন ও বাকি সব কন্টেন্ট এখানে থাকবে -->
    <nav class="navbar">...</nav>
    <div class="container">... (এখানে আপনার পুরো পোর্টফোলিও কন্টেন্ট বসিয়ে দিন)</div>

    <script>
        setTimeout(function() { document.getElementById('loader').style.display = 'none'; }, 3000);
    </script>
</body>
</html>
