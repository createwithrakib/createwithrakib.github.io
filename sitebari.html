<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bari | Brand Identity Case Study</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; scroll-behavior: smooth; }
        body { background-color: #061110; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background-color: rgba(6, 17, 16, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(17, 41, 38, 0.4); display: flex; justify-content: space-between; align-items: center; padding: 0 10%; z-index: 9999; }
        .nav-brand { text-decoration: none; color: #ffffff; font-weight: 700; }
        .back-btn { color: #06b6d4; text-decoration: none; font-weight: 600; border: 1px solid rgba(6, 182, 212, 0.3); padding: 8px 16px; border-radius: 6px; background-color: rgba(6, 182, 212, 0.05); transition: 0.3s; }
        .back-btn:hover { background-color: #06b6d4; color: #061110; }
        .container { max-width: 1100px; width: 100%; padding: 120px 20px 60px 20px; text-align: center; }
        h1 { font-size: 2.8rem; margin-bottom: 10px; }
        .subtitle { color: #06b6d4; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; margin-bottom: 40px; }
        .case-study-stack { display: flex; flex-direction: column; gap: 25px; }
        .artboard-wrapper { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #112926; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); transition: 0.3s; }
        .artboard-wrapper:hover { border-color: #06b6d4; transform: scale(1.01); }
        .artboard-img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">RAKIB AHMED</a>
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
    </nav>
    <div class="container">
        <h1>Site Bari</h1>
        <div class="subtitle">Brand Identity Case Study</div>
        <div class="case-study-stack" id="gallery"></div>
    </div>
    <script>
        const gallery = document.getElementById('gallery');
        // আপনার ১৫টি ইমেজ তাই ১৫ সেট করা হয়েছে
        for (let i = 1; i <= 15; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'artboard-wrapper';
            // ইমেজ ফরম্যাট: Site bari-01, Site bari-02...
            const num = i < 10 ? '0' + i : i;
            wrapper.innerHTML = `<img src="Site bari-${num}.jpg" class="artboard-img" loading="lazy">`;
            gallery.appendChild(wrapper);
        }
    </script>
</body>
</html>
