<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakib Ahmed | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #060606; color: #e2e8f0; }

        /* লডার - আপনার ব্র্যান্ড কালার সায়ান দিয়ে */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #060606; display: flex; justify-content: center; align-items: center; z-index: 99999; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(6, 182, 212, 0.2); border-top: 4px solid #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 900px; margin: 80px auto; padding: 20px; }
        h1 { margin-bottom: 10px; }
        
        /* প্রজেক্ট কার্ডের আগের ডিজাইন ফিরিয়ে আনা হলো */
        .project-card { background-color: #111; border: 1px solid #1a1a1a; padding: 25px; margin-bottom: 25px; border-radius: 10px; transition: 0.4s; }
        .project-card:hover { border-color: #06b6d4; transform: translateY(-5px); background-color: #161616; }
        
        .connect { margin-top: 50px; }
        a { color: #06b6d4; text-decoration: none; font-weight: 600; margin-right: 15px; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="container">
        <h1>Rakib Ahmed</h1>
        <p>Creative Logo & Brand Identity Designer</p>
        
        <div class="project-card">
            <h3>Foorti Courier</h3>
            <p>গতি, শক্তি এবং নির্ভরযোগ্যতাকে ফুটিয়ে তুলতে তৈরি একটি মোশন-বেসড লোগো সিস্টেম।</p>
        </div>

        <div class="project-card">
            <h3>Vaxon</h3>
            <p>হেলথ ও ওয়েলনেস ই-কমার্স প্ল্যাটফর্মের জন্য ভারসাম্য ও জীবনশক্তির প্রতীকী ভিজ্যুয়াল আইডেন্টিটি।</p>
        </div>

        <div class="connect">
            <h3>Connect With Me</h3>
            <br>
            <a href="#">Behance</a> 
            <a href="#">Email Me</a>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => document.getElementById('loader').style.display = 'none');
    </script>
</body>
</html>
