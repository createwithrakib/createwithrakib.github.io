<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakib Ahmed | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background-color: #030712; color: #f1f5f9; padding-top: 100px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* লোগো ও লোডার স্টাইল */
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #030712; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s; }
        
        /* কন্টেইনার */
        .container { max-width: 800px; width: 100%; padding: 40px 20px; z-index: 10; }
        
        /* সাইড ইমেজ ডেকোরেশন */
        .side-img { position: fixed; top: 20%; width: 250px; opacity: 0.15; z-index: 1; pointer-events: none; transition: transform 1.5s ease; }
        .left-img { left: 5%; }
        .right-img { right: 5%; }

        /* প্রজেক্ট কার্ড */
        .project-card { background: rgba(30, 41, 59, 0.3); padding: 30px; margin-bottom: 30px; border-radius: 15px; border: 1px solid #112926; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; transform: translateY(50px); }
        .project-card.active { opacity: 1; transform: translateY(0); }
        .project-card:hover { border-color: #06b6d4; transform: scale(1.02); }

        h1 { font-size: 3rem; margin-bottom: 10px; color: #fff; }
        .btn { display: inline-block; padding: 12px 24px; border: 2px solid #06b6d4; color: #06b6d4; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>

<!-- লোডার -->
<div id="loader"><h2>Rakib Ahmed | Loading...</h2></div>

<!-- সাইড ইমেজ -->
<img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e" class="side-img left-img">
<img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853" class="side-img right-img">

<div class="container">
    <header>
        <h1>Rakib Ahmed</h1>
        <p>Brand & Logo Designer</p>
    </header>

    <main id="projects">
        <div class="project-card reveal">
            <h3>Site Bari</h3>
            <p>A comprehensive brand identity design.</p>
        </div>
        <div class="project-card reveal">
            <h3>Foorti Courier</h3>
            <p>A motion-based logo system.</p>
        </div>
        <div class="project-card reveal">
            <h3>Vaxon</h3>
            <p>Minimalist visual identity for health and wellness.</p>
        </div>
    </main>
</div>

<script>
    // লোডার লুকানো
    setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800); }, 2000);

    // স্ক্রল অ্যানিমেশন
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
</script>

</body>
</html>
