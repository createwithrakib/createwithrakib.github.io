<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Bari | Brand Identity Case Study</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #061110; color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .navbar { position: fixed; top: 0; width: 100%; height: 80px; background-color: rgba(6, 17, 16, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(17, 41, 38, 0.4); display: flex; justify-content: space-between; align-items: center; padding: 0 10%; z-index: 9999; }
        .back-btn { color: #06b6d4; text-decoration: none; font-weight: 600; border: 1px solid rgba(6, 182, 212, 0.3); padding: 8px 16px; border-radius: 6px; }
        .container { max-width: 1100px; width: 100%; padding: 120px 20px 60px 20px; text-align: center; }
        h1 { font-size: 2.8rem; margin-bottom: 20px; }
        .case-study-stack { display: flex; flex-direction: column; gap: 25px; margin-top: 40px; }
        .artboard-wrapper { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #112926; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .artboard-img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" style="color:#fff; text-decoration:none; font-weight:700;">RAKIB AHMED</a>
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
    </nav>
    <div class="container">
        <h1>Site Bari</h1>
        <div class="case-study-stack" id="gallery"></div>
    </div>
    <script>
        const gallery = document.getElementById('gallery');
        // Site Bari-র জন্য যতগুলো ইমেজ আছে, ঠিক ততগুলো এখানে লুপ হবে
        const totalImages = 15; 
        for (let i = 1; i <= totalImages; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'artboard-wrapper';
            wrapper.innerHTML = `<img src="Artboard ${i}-100.jpg" class="artboard-img" loading="lazy">`;
            gallery.appendChild(wrapper);
        }
    </script>
</body>
</html>
